              - heading "1. イントロダクション：クリエイターエコノミーのインフラを担うセルシスの現在地" [level=2] [ref=e1059]
              - paragraph [ref=e1060]:
                - text: 株式会社セルシス（以下、セルシス）は、デジタルコンテンツ制作のワークフローを根底から支えるグラフィックス技術のスペシャリスト集団であり、今やグローバルなクリエイターエコノミーの「OS」とも呼べる地位を築いている。主力製品である「CLIP STUDIO PAINT」（通称：クリスタ）は、日本のマンガ・イラスト文化を背景に磨き上げられた高度な筆圧感知技術や独自の描画エンジンを武器に、世界中のプロフェッショナルからアマチュアまでを虜にしてきた
                - superscript [ref=e1061]
                - text: 。
                - button "詳細" [ref=e1064] [cursor=pointer]:
                  - img [ref=e1065]: expand_more
              - paragraph [ref=e1066]:
                - text: 現在のセルシスを投資対象として評価する上で、同社が「単なるソフトウェア開発会社」から「クリエイターのライフサイクル全体を支援するプラットフォーム企業」へと変貌を遂げようとしている点を理解することが重要である。2023年以降のサブスクリプションモデルへの完全移行は、同社の収益構造を「不安定なライセンス販売」から「高収益で予測可能なストック型」へと劇的に改善させた
                - superscript [ref=e1067]
                - text: 。さらに、次世代の流通基盤である「DC3」の展開により、デジタルコンテンツに「一点物としての所有権」を付与するという、Web3時代の新しい市場創出にも挑んでいる
                - superscript [ref=e1068]
                - text: 。
                - button "詳細" [ref=e1071] [cursor=pointer]:
                  - img [ref=e1072]: expand_more
              - paragraph [ref=e1073]: 本レポートでは、投資判断に不可欠なセグメント別分析、競争環境、技術的優位性、そして生成AIという破壊的技術がもたらすリスクと機会について、多角的な視点から深掘りを行う。
              - separator [ref=e1074]
