                - listitem [ref=e1388]:
                  - paragraph [ref=e1389]:
                    - generic [ref=e1390]: "DC3の特許戦略: デジタルコンテンツの個別識別と権利保護に関する技術について、Web3時代の標準化を狙った知財の積み上げを行っている"
                    - superscript [ref=e1391]
                    - text: 。
                    - button "詳細" [ref=e1394] [cursor=pointer]:
                      - img [ref=e1395]: expand_more
              - separator [ref=e1396]
              - heading "6. 規制環境とAIリスク（参照ソース：メディア記事 / アナリスト評価）" [level=2] [ref=e1397]
              - paragraph [ref=e1398]: ここ数年、セルシスにとって最大のトピックとなったのは、2022年12月の「画像生成AI実装中止」騒動である。
              - heading "6.1 画像生成AIを巡る教訓" [level=3] [ref=e1399]
              - paragraph [ref=e1400]:
                - text: セルシスはCLIP STUDIO PAINTにStable DiffusionベースのAI機能を試験導入しようとしたが、ユーザーから「他人の著作権を侵害したデータで学習されたAIを、プロの道具に入れるな」という激しい批判を浴び、わずか数日で撤回した
                - superscript [ref=e1401]
                - text: 。
                - button "詳細" [ref=e1404] [cursor=pointer]:
                  - img [ref=e1405]: expand_more
              - list [ref=e1406]:
                - listitem [ref=e1407]:
                  - paragraph [ref=e1408]:
                    - generic [ref=e1409]: "企業の主張: 「AIは創作活動をより楽しく、身近にする可能性を秘めている」とし、共存の道を模索したいと考えた"
                    - superscript [ref=e1410]
                    - text: 。
                    - button "詳細" [ref=e1413] [cursor=pointer]:
                      - img [ref=e1414]: expand_more
                - listitem [ref=e1415]:
                  - paragraph [ref=e1416]:
                    - generic [ref=e1417]: "第三者・ユーザーの評価: 「クリエイターに寄り添うはずのセルシスが、クリエイターの権利を軽視している」という厳しいブランド毀損を招いた"
                    - superscript [ref=e1418]
                    - text: 。
                    - button "詳細" [ref=e1421] [cursor=pointer]:
                      - img [ref=e1422]: expand_more
              - paragraph [ref=e1423]:
                - text: この一件以来、セルシスは「ユーザーデータの学習利用は同意なしに行わない」ことを明言し、現在は極めて慎重なスタンスをとっている
                - superscript [ref=e1424]
