              - separator [ref=e1268]
              - heading "4. 業界動向と競争環境（参照ソース：業界レポート / メディア記事 / 競合IR）" [level=2] [ref=e1269]
              - paragraph [ref=e1270]: セルシスが主戦場とする「クリエイターエコノミー市場」は、生成AIの台頭によりパラダイムシフトの真っ只中にある。
              - heading "4.1 市場規模の推移（矢野経済研究所・MURCデータ優先）" [level=3] [ref=e1271]
              - paragraph [ref=e1272]:
                - text: 国内のクリエイターエコノミー市場規模は、2024年時点で2兆894億円と推計され、2021年（1兆3,574億円）から年平均15.5%のペースで拡大している
                - superscript [ref=e1273]
                - text: 。さらに、潜在市場を含めると14兆5,866億円に達するという試算もあり、伸び代は極めて大きい
                - superscript [ref=e1274]
                - text: 。
