                      - paragraph [ref=e1445]: "北米・欧州: 伝統的なコミック・イラスト市場。"
                    - listitem [ref=e1446]:
                      - paragraph [ref=e1447]: "アジア（タイ、韓国、中国）: ウェブトゥーン（縦スクロールマンガ）の爆発的普及に伴い、制作ツールとしてのデファクトスタンダード化を狙う。"
