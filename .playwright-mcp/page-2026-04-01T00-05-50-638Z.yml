              - heading "4.3 参入障壁と逆風要因" [level=3] [ref=e1360]
              - paragraph [ref=e1361]:
                - text: セルシスの参入障壁は「習得コスト」と「コミュニティのネットワーク外部性」にある。一度CLIP STUDIO PAINTの操作に慣れたプロが他社ツールへ移行することは稀であり、また、ネット上に溢れる「クリスタ用自作ブラシ」や「描き方講座」の存在が、新規ユーザーを自動的に呼び込む装置となっている
                - superscript [ref=e1362]
                - text: 。
                - button "詳細" [ref=e1365] [cursor=pointer]:
                  - img [ref=e1366]: expand_more
              - paragraph [ref=e1367]: 一方で、最大の逆風は「生成AI」である。単純な素材制作や彩色、背景の描画がAIに置き換わる中で、制作ソフトとしての価値をどこに置くかが問われている。
              - separator [ref=e1368]
              - heading "5. 技術的優位性・知的財産（参照ソース：自社IR / テックメディア）" [level=2] [ref=e1369]
              - paragraph [ref=e1370]: セルシスの強みは、単なる機能の多さではなく、それらを支える基礎技術の集積にある。
              - list [ref=e1371]:
                - listitem [ref=e1372]:
                  - paragraph [ref=e1373]:
                    - generic [ref=e1374]: "独自描画エンジン: 筆圧の変化に遅延なく反応し、デジタル特有の「硬さ」を排除した自然な線を生成する技術は、長年のR&Dの賜物である"
                    - superscript [ref=e1375]
                    - text: 。
                    - button "詳細" [ref=e1378] [cursor=pointer]:
                      - img [ref=e1379]: expand_more
                - listitem [ref=e1380]:
                  - paragraph [ref=e1381]:
                    - generic [ref=e1382]: "AI活用の歴史: セルシスは決してAIに消極的だったわけではない。2022年以前から「自動彩色」や「ポーズスキャナー」といった、クリエイターの「手」を助ける補助的なAI機能を実装してきた"
                    - superscript [ref=e1383]
                    - text: 。
                    - button "詳細" [ref=e1386] [cursor=pointer]:
