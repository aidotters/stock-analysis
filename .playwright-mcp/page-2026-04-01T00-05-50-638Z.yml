                    - listitem [ref=e1524]:
                      - paragraph [ref=e1525]:
                        - generic [ref=e1526]: "DC3の成否: 期待値の高い新規事業だが、収益化にはまだ時間を要し、市場が受け入れるかどうかの確証はない"
                        - superscript [ref=e1527]
                        - text: 。
                        - button "詳細" [ref=e1530] [cursor=pointer]:
                          - img [ref=e1531]: expand_more
              - paragraph [ref=e1532]: 結論として、セルシスは「安定した高収益を生む既存事業（クリスタ）」と「大きな夢を追う新規事業（DC3）」の両輪を持つ、非常にユニークな成長株である。短期的な株価はAI関連のニュースや為替に左右される可能性があるが、中長期的には世界中のクリエイターが「筆」を持ち続ける限り、その基盤を支配する同社の価値は揺るぎないものと考えられる。投資家は、次の四半期決算におけるサブスクリプションの「解約率（チャーンレート）」と、DC3の具体的導入事例の増加に注視すべきである。
