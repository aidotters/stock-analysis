              - heading "4.2 主要競合企業との比較" [level=3] [ref=e1319]
              - paragraph [ref=e1320]: セルシスは、特定の「ニッチな専門性」を守り抜くことで、巨大なグローバル企業との差別化を図っている。
              - table [ref=e1322]:
                - rowgroup [ref=e1323]:
                  - row "競合企業 主力製品 セルシスとの比較・優位性 懸念点" [ref=e1324]:
