                  - paragraph [ref=e1514]: "ネガティブサイド（注意すべきリスク）:"
                  - list [ref=e1515]:
                    - listitem [ref=e1516]:
                      - paragraph [ref=e1517]:
                        - generic [ref=e1518]: "AI倫理とブランドリスク: 2022年の不評は、同社が「技術」と「ユーザー感情」のバランスを読み誤る可能性を示した"
                        - superscript [ref=e1519]
                        - text: 。生成AIへの対応ミスは、一瞬でユーザー離れを招く毒薬になり得る。
