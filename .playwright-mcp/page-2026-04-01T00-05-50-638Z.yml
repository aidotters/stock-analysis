              - heading "3.2 成長ドライバーとリスク要因" [level=3] [ref=e1248]
              - paragraph [ref=e1249]: 今後の成長を牽引するのは、間違いなく「海外市場の深掘り」と「DC3によるプラットフォーム化」である。
              - list [ref=e1250]:
                - listitem [ref=e1251]:
                  - paragraph [ref=e1252]:
                    - generic [ref=e1253]: "海外戦略: 日本のマンガ・ウェブトゥーン文化の世界的な浸透は、そのまま「CLIP STUDIO PAINT」の需要増に直結する。特にタイやブラジルといった新興国では、スマートフォンの普及に伴い、安価なモバイル版プランが急速に拡大している"
                    - superscript [ref=e1254]
                    - text: 。
                    - button "詳細" [ref=e1257] [cursor=pointer]:
                      - img [ref=e1258]: expand_more
                - listitem [ref=e1259]:
                  - paragraph [ref=e1260]:
                    - generic [ref=e1261]: "DC3の不確実性: 企業のIR資料ではDC3を「WEB3時代の新しいデジタルコンテンツ流通基盤」として極めてポジティブに描いているが"
                    - superscript [ref=e1262]
                    - text: 、一方で第三者視点では、既存のプラットフォーム（AppleやGoogleのアプリ内課金ルール等）との整合性や、一般ユーザーが「所有」という概念にどこまで対価を払うかについて、懐疑的な見方も存在する
                    - superscript [ref=e1263]
                    - text: 。
                    - button "詳細" [ref=e1266] [cursor=pointer]:
