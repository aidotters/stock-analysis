                - generic [ref=e1594]:
                  - button "Google スプレッドシートにエクスポート" [ref=e1595]:
                    - generic [ref=e1597]:
                      - img [ref=e1599]: drive_spreadsheet
                      - generic [ref=e1600]: Google スプレッドシートにエクスポート
                  - button "表をコピー" [ref=e1603] [cursor=pointer]:
                    - img [ref=e1604]: content_copy
              - paragraph [ref=e1607]:
                - superscript [ref=e1608]
                - button "詳細" [ref=e1611] [cursor=pointer]:
                  - img [ref=e1612]: expand_more
              - paragraph [ref=e1613]:
                - text: ROE（自己資本利益率）が12.9%まで向上している点は特筆に値する。日本企業の平均を大きく上回る収益性を実現しており、かつ自己資本比率が80%を超えていることから、財務上の安全性と資本効率の両立がなされている
                - superscript [ref=e1614]
                - text: 。営業活動によるキャッシュフローも2025年10月期には743百万円と大幅に増加しており、フリーキャッシュフローが潤沢であるため、さらなるM&Aや大規模設備投資に向けた余力は十分にある
                - superscript [ref=e1615]
                - text: 。
                - button "詳細" [ref=e1618] [cursor=pointer]:
                  - img [ref=e1619]: expand_more
              - heading "証券アナリストの評価と株価動向" [level=3] [ref=e1620]
              - paragraph [ref=e1621]:
                - text: みんかぶのAI株価診断によれば、現在の株価水準は過去の業績比較や競合比較において「割安」と判断されている
                - superscript [ref=e1622]
                - text: 。一方で、大手証券アナリストによるカバーが少なく、市場での流動性が限定的であることが、バリュエーション（PER等）が低位に留まっている要因の一つと推察される
                - superscript [ref=e1623]
                - text: 。
                - button "詳細" [ref=e1626] [cursor=pointer]:
                  - img [ref=e1627]: expand_more
              - paragraph [ref=e1628]:
                - text: しかし、フィスコ等の独立系アナリストレポートでは、過去最高益の更新やイデイとのシナジー、パッケージ事業への進出を高く評価しており、時価総額の拡大余地についてはポジティブな見解が示されている
                - superscript [ref=e1629]
                - text: 。現在の目標株価は、AI診断によれば2,281円（売り評価も含むが理論株価は2,630円）と算出されており、業績の進捗次第では大きな修正が期待できる
                - superscript [ref=e1630]
                - text: 。
                - button "詳細" [ref=e1633] [cursor=pointer]:
                  - img [ref=e1634]: expand_more
              - heading "結論と投資判断に向けた提言" [level=2] [ref=e1635]
              - paragraph [ref=e1636]: ビーアンドピー（7804）は、印刷という「成熟産業」において、「DX」と「垂直統合」という現代的な成長エンジンを組み込むことに成功した稀有な企業である。
              - heading "ポジティブ要素の要約" [level=3] [ref=e1637]
              - list [ref=e1638]:
                - listitem [ref=e1639]:
                  - paragraph [ref=e1640]:
                    - generic [ref=e1641]: "圧倒的な収益性と効率性: 営業利益率15%台、ROE12%超えは、印刷業界では極めて異例の強さである"
                    - superscript [ref=e1642]
                    - text: 。
                    - button "詳細" [ref=e1645] [cursor=pointer]:
                      - img [ref=e1646]: expand_more
                - listitem [ref=e1647]:
                  - paragraph [ref=e1648]:
                    - generic [ref=e1649]: "イデイ統合によるシナジー: デザイン（上流）から生産（下流）までを自社完結させることで、他社が真似できない付加価値とスピード、そして高いマージンを確保している"
                    - superscript [ref=e1650]
                    - text: 。
                    - button "詳細" [ref=e1653] [cursor=pointer]:
                      - img [ref=e1654]: expand_more
                - listitem [ref=e1655]:
                  - paragraph [ref=e1656]:
                    - generic [ref=e1657]: "市場の構造的変化への適応: デジタルサイネージやAR、AIカメラによる属性分析など、リテールメディア化する店舗需要を確実に取り込んでいる"
                    - superscript [ref=e1658]
                    - text: 。
                    - button "詳細" [ref=e1661] [cursor=pointer]:
                      - img [ref=e1662]: expand_more
                - listitem [ref=e1663]:
                  - paragraph [ref=e1664]:
                    - generic [ref=e1665]: "強固な財務体質: 自己資本比率80%超えの無借金に近い経営でありながら、高い資本効率を維持している"
                    - superscript [ref=e1666]
                    - text: 。
                    - button "詳細" [ref=e1669] [cursor=pointer]:
                      - img [ref=e1670]: expand_more
              - heading "懸念事項とリスク管理" [level=3] [ref=e1671]
              - list [ref=e1672]:
                - listitem [ref=e1673]:
                  - paragraph [ref=e1674]:
                    - generic [ref=e1675]: "一過性の費用増: 2026年10月期は拠点統合や投資による利益の伸び悩みが見られる可能性があるため、中長期的な視点が必要である"
                    - superscript [ref=e1676]
                    - text: 。
                    - button "詳細" [ref=e1679] [cursor=pointer]:
                      - img [ref=e1680]: expand_more
                - listitem [ref=e1681]:
                  - paragraph [ref=e1682]:
                    - generic [ref=e1683]: "景気変動感応度: 企業の広告宣伝費に依存するため、国内景気の後退局面では一時的な業績鈍化のリスクを孕む"
                    - superscript [ref=e1684]
                    - text: 。
                    - button "詳細" [ref=e1687] [cursor=pointer]:
                      - img [ref=e1688]: expand_more
                - listitem [ref=e1689]:
                  - paragraph [ref=e1690]:
                    - generic [ref=e1691]: "原材料コスト: 為替やエネルギー価格の変動が、高収益なマージンを削る要因となる可能性がある"
                    - superscript [ref=e1692]
                    - text: 。
                    - button "詳細" [ref=e1695] [cursor=pointer]:
                      - img [ref=e1696]: expand_more
              - heading "総評" [level=3] [ref=e1697]
              - paragraph [ref=e1698]:
                - text: 投資家にとってのビーアンドピーは、単なる「印刷株」ではなく、「リテールDXを支援するテック系ソリューション株」としての側面を評価すべき段階に来ている。時価総額はまだ小規模であるが、ニッチな市場で圧倒的なシェアと技術的優位性を持ち、かつ新たな成長の種（パッケージ、AI分析）を撒き終えている現状は、長期投資において非常に魅力的なエントリーポイントを示唆している。特にイデイの内製化が完遂され、グループとしての営業力が最大化される今後数年間の業績拡大には、高い蓋然性があると言えるだろう
                - superscript [ref=e1699]
                - text: 。
                - button "詳細" [ref=e1702] [cursor=pointer]:
                  - img [ref=e1703]: expand_more
