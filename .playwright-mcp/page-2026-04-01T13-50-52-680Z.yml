              - heading "ビーアンドピー（7804）における商業印刷の再定義：リアルメディアとデジタルソリューションの垂直統合に関する包括的調査報告" [level=1] [ref=e1063]
              - heading "市場環境の変遷と同社の戦略的ポジショニング" [level=2] [ref=e1064]
              - paragraph [ref=e1065]:
                - text: 株式会社ビーアンドピー（以下、同社）は、業務用大判インクジェット印刷市場において、独自の垂直統合型ビジネスモデルを構築したニッチトップ企業として知られている。同社が展開する事業は、単なる「印刷業」という伝統的なカテゴリーには収まらない。都市開発、リテールテック、体験型マーケティングといった現代の経済活動に不可欠な「空間演出」と「情報伝達」を担う、極めて付加価値の高いソリューションプロバイダーとしての性格を強めている
                - superscript [ref=e1066]
                - text: 。
                - button "詳細" [ref=e1069] [cursor=pointer]:
                  - img [ref=e1070]: expand_more
              - paragraph [ref=e1071]:
                - text: 2020年代半ばの現在、国内の広告・販促市場は、インターネット広告へのシフトが続く一方で、物理的な空間における「リアルな体験」の重要性が再評価される局面にある
                - superscript [ref=e1072]
                - text: 。矢野経済研究所の調査によれば、2024年度の国内ディスプレイ業の市場規模は、インバウンド需要の拡大や大規模な都市再開発を背景に、前年度比11.9％増の1兆7,900億円に達すると予測されている
                - superscript [ref=e1073]
                - text: 。このような旺盛な空間演出需要に対し、同社は大阪と東京の都心部に生産拠点を構え、24時間体制での「超短納期」と「高精度な出力」を武器に、競合他社を圧倒する機動力を発揮している
                - superscript [ref=e1074]
                - text: 。
                - button "詳細" [ref=e1077] [cursor=pointer]:
                  - img [ref=e1078]: expand_more
              - paragraph [ref=e1079]:
                - text: 特に注目すべきは、同社が推進する「リアル領域 × デジタル領域」の融合戦略である
                - superscript [ref=e1080]
                - text: 。2025年10月期より開始された連結決算体制において、同社は広告企画・デザインに強みを持つ株式会社イデイを完全子会社化し、上流工程の「企画・設計」から、下流工程の「印刷・施工」までを一気通貫で提供できる体制を整えた
                - superscript [ref=e1081]
                - text: 。この垂直統合は、単なるコスト削減に留まらず、顧客の販促活動におけるDX（デジタルトランスフォーメーション）を支援するデジタルサイネージやAR（拡張現実）ソリューションの深化を伴っている
                - superscript [ref=e1082]
                - text: 。本報告書では、同社の事業セグメント、成長性、技術的優位性、および業界の競争環境を多角的に分析し、投資判断に供する包括的な知見を提示する。
                - button "詳細" [ref=e1085] [cursor=pointer]:
                  - img [ref=e1086]: expand_more
              - heading "セグメント別事業分析と競争力の源泉" [level=2] [ref=e1087]
              - paragraph [ref=e1088]:
                - text: 同社の収益構造は、主力であるインクジェットプリント事業を核に、そこから派生したオーダーグッズ、デジタルクリエイト、そして新たに立ち上げられたパッケージソリューションという4つの主要ドメインで構成されている
                - superscript [ref=e1089]
                - text: 。2025年10月期の通期実績において、売上高は4,495百万円に達し、連結化されたイデイの寄与と主力事業の伸長により、過去最高益を更新している
                - superscript [ref=e1090]
                - text: 。
                - button "詳細" [ref=e1093] [cursor=pointer]:
                  - img [ref=e1094]: expand_more
              - heading "インクジェットプリント事業：圧倒的生産力による参入障壁" [level=3] [ref=e1095]
              - paragraph [ref=e1096]:
                - text: インクジェットプリント事業は売上高の過半を占める同社の屋台骨であり、屋内外看板、ウィンドウディスプレイ、車両ラッピング、内装壁紙など、多岐にわたる「カタチある広告」を制作している
                - superscript [ref=e1097]
                - text: 。このセグメントにおける差別化要因は、単なる設備の多さだけでなく、その運用体制にある
                - superscript [ref=e1098]
                - text: 。
                - button "詳細" [ref=e1101] [cursor=pointer]:
                  - img [ref=e1102]: expand_more
              - paragraph [ref=e1103]:
                - text: 同社は100台を超える最新鋭のプリンターと加工機を保有し、大阪・東京の両拠点で24時間稼働を実現している
                - superscript [ref=e1104]
                - text: 。これにより、物量によっては「夕方入稿、翌日午前納品」という、一般的な印刷会社では対応不可能なリードタイムでの提供を可能にしている
                - superscript [ref=e1105]
                - text: 。これは、納期が極めてタイトなイベント業界やリテール業界において絶大な信頼を獲得しており、1年以上の継続取引割合が70%を超えるという、高い顧客ロイヤリティの源泉となっている
                - superscript [ref=e1106]
                - text: 。
                - button "詳細" [ref=e1109] [cursor=pointer]:
                  - img [ref=e1110]: expand_more
              - table [ref=e1112]:
                - rowgroup [ref=e1113]:
                  - row "指標 2025年10月期 実績 評価と特性" [ref=e1114]:
                    - columnheader "指標" [ref=e1115]
                    - columnheader "2025年10月期 実績" [ref=e1116]
                    - columnheader "評価と特性" [ref=e1117]
                - rowgroup [ref=e1118]:
                  - row "売上高（連結） 4,495百万円 過去最高を更新、前年比約27%増" [ref=e1119]:
                    - cell "売上高（連結）" [ref=e1120]
                    - cell "4,495百万円" [ref=e1121]
                    - cell "過去最高を更新、前年比約27%増" [ref=e1122]:
                      - paragraph [ref=e1123]:
                        - text: 過去最高を更新、前年比約27%増
                        - superscript [ref=e1124]
                  - row "営業利益（連結） 701百万円 上場以来最高益、利益率15.6%" [ref=e1125]:
                    - cell "営業利益（連結）" [ref=e1126]
                    - cell "701百万円" [ref=e1127]
                    - cell "上場以来最高益、利益率15.6%" [ref=e1128]:
                      - paragraph [ref=e1129]:
                        - text: 上場以来最高益、利益率15.6%
                        - superscript [ref=e1130]
                  - row "設備保有数 100台以上 業界最多水準の出力・加工機" [ref=e1131]:
                    - cell "設備保有数" [ref=e1132]
                    - cell "100台以上" [ref=e1133]
                    - cell "業界最多水準の出力・加工機" [ref=e1134]:
                      - paragraph [ref=e1135]:
                        - text: 業界最多水準の出力・加工機
                        - superscript [ref=e1136]
                  - row "稼働体制 24時間体制 東京・大阪の都心拠点を活用" [ref=e1137]:
                    - cell "稼働体制" [ref=e1138]
                    - cell "24時間体制" [ref=e1139]
                    - cell "東京・大阪の都心拠点を活用" [ref=e1140]:
                      - paragraph [ref=e1141]:
                        - text: 東京・大阪の都心拠点を活用
                        - superscript [ref=e1142]
              - button "詳細" [ref=e1145] [cursor=pointer]:
                - img [ref=e1146]: expand_more
              - paragraph [ref=e1147]:
                - text: 自社IR資料によれば、同社は水性、溶剤、昇華転写、UVフラットベッドといった多様な印刷方式を社内に網羅しており、布地、塩ビシート、金属、木材といったあらゆる素材に対応可能である
                - superscript [ref=e1148]
                - text: 。第三者視点で見れば、この「全素材対応」と「都心・短納期」の組み合わせは、小規模な印刷所が抱える設備不足のリスクや、郊外型の大工場が抱える配送タイムラグのリスクを回避した、極めて合理的なニッチトップ戦略と言える
                - superscript [ref=e1149]
                - text: 。
                - button "詳細" [ref=e1152] [cursor=pointer]:
                  - img [ref=e1153]: expand_more
              - heading "オーダーグッズ事業とIPビジネスの進展" [level=3] [ref=e1154]
              - paragraph [ref=e1155]:
                - text: オーダーグッズ制作は、ノベルティやキャラクターグッズ（IPビジネス）の企画・制作を行う領域である
                - superscript [ref=e1156]
                - text: 。従来の「安価なバラマキ」型のノベルティから、ファンが購買を目的とする「高付加価値グッズ」へと市場がシフトする中で、同社の多品種小ロット・高精度プリント技術が威力を発揮している
                - superscript [ref=e1157]
                - text: 。
                - button "詳細" [ref=e1160] [cursor=pointer]:
                  - img [ref=e1161]: expand_more
              - paragraph [ref=e1162]:
                - text: 特にUV-DTFプリンターを用いた立体物や曲面へのフルカラープリント技術は、ヘルメットやデジタルデバイスといった従来印刷が難しかった素材への加飾を可能にしており、アーティストやインフルエンサー、スポーツチームの物販需要を強力に取り込んでいる
                - superscript [ref=e1163]
                - text: 。埼玉西武ライオンズのベルーナドームにおけるAR連動型看板やグッズの制作事例は、同社が「リアルなモノづくり」と「デジタル体験」を高い次元で融合させている証左である
                - superscript [ref=e1164]
                - text: 。
                - button "詳細" [ref=e1167] [cursor=pointer]:
                  - img [ref=e1168]: expand_more
              - heading "デジタルクリエイト事業：リテールマーケティングの高度化" [level=3] [ref=e1169]
              - paragraph [ref=e1170]:
                - text: デジタルクリエイトセグメントは、デジタルサイネージとARサービスを中心に構成される成長領域である
                - superscript [ref=e1171]
                - text: 。富士キメラ総研の調査では、国内のデジタルサイネージ市場は2024年に2,740億円（前年比14.7%増）に達し、2030年には4,609億円まで拡大すると予測されており、同社はこの巨大な潮流のど真ん中に位置している
                - superscript [ref=e1172]
                - text: 。
                - button "詳細" [ref=e1175] [cursor=pointer]:
                  - img [ref=e1176]: expand_more
              - paragraph [ref=e1177]:
                - text: 同社のサイネージ戦略は、単なるハードウェアの設置に留まらない。シンガポールのZKDigimax社と提携し、AIカメラを用いた来場者属性分析（性別、年齢、滞在時間）と連動した配信管理システムを提供している
                - superscript [ref=e1178]
                - text: 。これは「どの看板が、誰に、どれだけ見られたか」という、従来の屋外広告では不明確だった効果測定を可能にするものであり、デジタルマーケティングやリテールDXを志向するクライアントからの評価が非常に高い
                - superscript [ref=e1179]
                - text: 。また、専用アプリ不要のWebAR技術を用いることで、ポスターや看板から動画を出現させるなどの販促キャンペーンを、開発コストを抑えつつ迅速に展開できる体制を整えている
                - superscript [ref=e1180]
                - text: 。
                - button "詳細" [ref=e1183] [cursor=pointer]:
                  - img [ref=e1184]: expand_more
              - heading "パッケージソリューション：EC市場の拡大を捉える新領域" [level=3] [ref=e1185]
              - paragraph [ref=e1186]:
                - text: 2025年より本格稼働したパッケージソリューション事業は、EC市場の拡大に伴う「開封体験」の価値向上を狙った戦略的進出である
                - superscript [ref=e1187]
                - text: 。化粧品や高級日用品のD2Cブランドにおいて、小ロットでオリジナル性の高い貼箱やギフトBOXの需要が急増している
                - superscript [ref=e1188]
                - text: 。
                - button "詳細" [ref=e1191] [cursor=pointer]:
                  - img [ref=e1192]: expand_more
              - paragraph [ref=e1193]:
                - text: イデイの設計・デザイン能力を活用することで、商品の魅力を引き出す構造設計から、同社のプリント技術を用いた意匠性の高い印刷、そして短納期での納品を可能にしている
                - superscript [ref=e1194]
                - text: 。これは、従来の大量生産を前提とした段ボールメーカーやパッケージメーカーが苦手としていた領域であり、同社のオンデマンド生産能力との親和性が極めて高い
                - superscript [ref=e1195]
                - text: 。証券アナリストレポートの要旨によれば、この新事業の立ち上げは、既存のサイン・ディスプレイ依存の収益構造を多様化させるものとして、ポジティブに捉えられている
                - superscript [ref=e1196]
                - text: 。
                - button "詳細" [ref=e1199] [cursor=pointer]:
                  - img [ref=e1200]: expand_more
              - heading "セグメント別成長性と収益構造の分析" [level=2] [ref=e1201]
              - paragraph [ref=e1202]:
                - text: 同社の成長は、既存事業の市場シェア拡大と、新領域への機能拡大という両輪によって支えられている。2025年10月期の業績が期初計画を売上高で4.5%、営業利益で11.1%上振れて着地したことは、同社の成長シナリオが想定以上のスピードで進捗していることを示唆している
                - superscript [ref=e1203]
                - text: 。
                - button "詳細" [ref=e1206] [cursor=pointer]:
                  - img [ref=e1207]: expand_more
              - heading "成長トレンドとCAGRの考察" [level=3] [ref=e1208]
              - paragraph [ref=e1209]:
                - text: 過去3〜5年の業績推移を見ると、コロナ禍による一時的な停滞を除けば、売上高および利益は右肩上がりのトレンドにある
                - superscript [ref=e1210]
                - text: 。
                - button "詳細" [ref=e1213] [cursor=pointer]:
                  - img [ref=e1214]: expand_more
              - paragraph [ref=e1215]:
                - text: 売上高の成長率を分析すると、2022年10月期の2,915百万円から2025年10月期の4,495百万円まで、3年間で売上高は約54%増加している
                - superscript [ref=e1216]
                - text: 。これを年平均成長率（CAGR）で算出すると以下のようになる。
                - button "詳細" [ref=e1219] [cursor=pointer]:
                  - img [ref=e1220]: expand_more
              - generic [ref=e1225]:
                - generic [ref=e1226]: CAGR =
                - generic [ref=e1227]:
                  - generic [ref=e1228]:
                    - generic [ref=e1229]:
                      - generic [ref=e1230]: (
                      - generic [ref=e1235]:
                        - generic [ref=e1236]: 2, 915
                        - generic [ref=e1238]: 4, 495
                      - generic [ref=e1242]: )
                    - generic [ref=e1253]:
                      - generic [ref=e1255]: "3"
                      - generic [ref=e1258]: "1"
                  - text: −
                - generic [ref=e1262]: 1 ≈
                - generic [ref=e1263]: 15.5%
              - paragraph [ref=e1264]:
                - text: 商業印刷という成熟産業において、15%を超えるCAGRを維持している点は驚異的であり、同社がいかに効率的なシェア奪取と領域拡大を行っているかがわかる
                - superscript [ref=e1265]
                - text: 。
                - button "詳細" [ref=e1268] [cursor=pointer]:
                  - img [ref=e1269]: expand_more
              - heading "イデイ連結化による収益性の質的変化" [level=3] [ref=e1270]
              - paragraph [ref=e1271]:
                - text: 2024年11月に連結化されたイデイの影響は、単なる売上の加算に留まらない
                - superscript [ref=e1272]
                - text: 。イデイはこれまで自社内に生産機能を持たず、外注費が利益率を圧迫して赤字が続いていた経緯がある
                - superscript [ref=e1273]
                - text: 。同社グループ入りしたことで、イデイが受注した案件を同社の生産ラインで内製化することが可能となり、グループ全体の売上総利益率（マージン）の改善に寄与している
                - superscript [ref=e1274]
                - text: 。
                - button "詳細" [ref=e1277] [cursor=pointer]:
                  - img [ref=e1278]: expand_more
              - paragraph [ref=e1279]:
                - text: 2025年10月期の売上総利益率は42.7%と、連結化に伴う一過性のコスト増や原材料費の変動により前期比で1.5ポイント低下したものの、販管費率が27.1%（同1.5ポイント改善）と効率化が進んだ結果、営業利益率は15.6%と業界最高水準を維持している
                - superscript [ref=e1280]
                - text: 。これは、同社の内製化モデルが、規模の経済を効かせつつ固定費を適切にコントロールできていることを示している
                - superscript [ref=e1281]
                - text: 。
                - button "詳細" [ref=e1284] [cursor=pointer]:
                  - img [ref=e1285]: expand_more
              - heading "今後の成長ドライバーと懐疑的視点" [level=3] [ref=e1286]
              - paragraph [ref=e1287]:
                - text: 今後の成長を牽引するのは、リテールDXとパッケージソリューションの2点であることは疑いようがない
                - superscript [ref=e1288]
                - text: 。しかし、投資判断においては以下の懐疑的な視点も考慮すべきである。
                - button "詳細" [ref=e1291] [cursor=pointer]:
                  - img [ref=e1292]: expand_more
              - list [ref=e1293]:
                - listitem [ref=e1294]:
                  - paragraph [ref=e1295]:
                    - generic [ref=e1296]: "デジタル代替の加速: 液晶モニターの低価格化が進むことで、ポスターや看板などの「静止画メディア」が完全にデジタルサイネージへ置き換わるリスクがある"
                    - superscript [ref=e1297]
                    - text: 。同社はサイネージ事業も手がけているが、ハードウェア販売は印刷に比べて利益率が低く、コンテンツ制作やシステム運用（BPクラウド）でいかに高い継続収益を上げられるかが鍵となる
                    - superscript [ref=e1298]
                    - text: 。
                    - button "詳細" [ref=e1301] [cursor=pointer]:
                      - img [ref=e1302]: expand_more
                - listitem [ref=e1303]:
                  - paragraph [ref=e1304]:
                    - generic [ref=e1305]: "労働力確保と拠点統合リスク: 2026年10月期1Qにおいて、営業利益が前年同期比で34%減益となった要因として、拠点移転・統合に伴う一過性の費用や人件費の増加が挙げられている"
                    - superscript [ref=e1306]
                    - text: 。24時間体制を維持するための労務コスト増は、同社の高利益率構造に対する構造的な逆風となる可能性がある
                    - superscript [ref=e1307]
                    - text: 。
                    - button "詳細" [ref=e1310] [cursor=pointer]:
                      - img [ref=e1311]: expand_more
              - heading "業界動向と競争環境の深掘り" [level=2] [ref=e1312]
              - paragraph [ref=e1313]:
                - text: サイン・ディスプレイ業界は、これまで地域密着型の小規模な看板業者が乱立する「分散型市場」であった。しかし、顧客である大手企業側の販促活動がデジタル化・高度化するにつれ、全国規模での一括対応や、ITを駆使した提案力が求められる「集約型市場」へと変貌しつつある
                - superscript [ref=e1314]
                - text: 。
                - button "詳細" [ref=e1317] [cursor=pointer]:
                  - img [ref=e1318]: expand_more
              - heading "市場の主要トレンド：リテールメディアと空間演出" [level=3] [ref=e1319]
              - paragraph [ref=e1320]:
                - text: 矢野経済研究所の報告によると、現在のディスプレイ市場は、単なる「表示」から「空間体験の創出」へとシフトしている
                - superscript [ref=e1321]
                - text: 。特に百貨店や大型商業施設、ホテルにおいては、訪日客をターゲットとしたラグジュアリーな演出が重視されており、高精細なLEDビジョンや、特殊素材を用いた大型出力の需要が極めて強い
                - superscript [ref=e1322]
                - text: 。
                - button "詳細" [ref=e1325] [cursor=pointer]:
                  - img [ref=e1326]: expand_more
              - paragraph [ref=e1327]:
                - text: また、富士キメラ総研が指摘する「データ分析ソリューション市場」の成長（2024年：前年比18.5%増の243億円）は、デジタルサイネージが単なる広告媒体から、人流や属性を把握する「センサーデバイス」へと進化したことを裏付けている
                - superscript [ref=e1328]
                - text: 。同社が展開するAI分析機能付きサイネージは、このリテールメディア化の最先端を行くものであり、従来の印刷会社とは一線を画す競争優位性を確立している
                - superscript [ref=e1329]
                - text: 。
                - button "詳細" [ref=e1332] [cursor=pointer]:
                  - img [ref=e1333]: expand_more
              - heading "競合比較：国内・海外の視点" [level=3] [ref=e1334]
              - paragraph [ref=e1335]:
                - text: 同社の直接的な競合は、同じ東証上場企業ではイタミアート（168A）や平賀（7827）が挙げられる
                - superscript [ref=e1336]
                - text: 。
                - button "詳細" [ref=e1339] [cursor=pointer]:
                  - img [ref=e1340]: expand_more
              - table [ref=e1342]:
                - rowgroup [ref=e1343]:
                  - row "企業名 市場 特徴・強み 戦略の差異" [ref=e1344]:
                    - columnheader "企業名" [ref=e1345]
                    - columnheader "市場" [ref=e1346]
                    - columnheader "特徴・強み" [ref=e1347]
                    - columnheader "戦略の差異" [ref=e1348]
                - rowgroup [ref=e1349]:
                  - row "ビーアンドピー (7804) スタンダード 24時間体制の圧倒的生産力、リアル×デジタルの垂直統合 営業によるコンサル型提案と都心生産のスピード" [ref=e1350]:
                    - cell "ビーアンドピー (7804)" [ref=e1351]:
                      - generic [ref=e1352]: ビーアンドピー (7804)
                    - cell "スタンダード" [ref=e1353]
                    - cell "24時間体制の圧倒的生産力、リアル×デジタルの垂直統合" [ref=e1354]:
                      - paragraph [ref=e1355]:
                        - text: 24時間体制の圧倒的生産力、リアル×デジタルの垂直統合
                        - superscript [ref=e1356]
                    - cell "営業によるコンサル型提案と都心生産のスピード" [ref=e1357]:
                      - paragraph [ref=e1358]:
                        - text: 営業によるコンサル型提案と都心生産のスピード
                        - superscript [ref=e1359]
                  - row "イタミアート (168A) グロース のぼり旗・看板のECサイト運営、AIによる効率化 ECを通じた小口・多頻度の全国対応" [ref=e1360]:
                    - cell "イタミアート (168A)" [ref=e1361]:
                      - generic [ref=e1362]: イタミアート (168A)
                    - cell "グロース" [ref=e1363]
                    - cell "のぼり旗・看板のECサイト運営、AIによる効率化" [ref=e1364]:
                      - paragraph [ref=e1365]:
                        - text: のぼり旗・看板のECサイト運営、AIによる効率化
                        - superscript [ref=e1366]
                    - cell "ECを通じた小口・多頻度の全国対応" [ref=e1367]:
                      - paragraph [ref=e1368]:
                        - text: ECを通じた小口・多頻度の全国対応
                        - superscript [ref=e1369]
                  - row "平賀 (7827) スタンダード 販促企画、老舗の信頼感 伝統的な印刷と店頭プロモーション" [ref=e1370]:
                    - cell "平賀 (7827)" [ref=e1371]:
                      - generic [ref=e1372]: 平賀 (7827)
                    - cell "スタンダード" [ref=e1373]
                    - cell "販促企画、老舗の信頼感" [ref=e1374]:
                      - paragraph [ref=e1375]:
                        - text: 販促企画、老舗の信頼感
                        - superscript [ref=e1376]
                    - cell "伝統的な印刷と店頭プロモーション" [ref=e1377]:
                      - paragraph [ref=e1378]:
                        - text: 伝統的な印刷と店頭プロモーション
                        - superscript [ref=e1379]
              - button "詳細" [ref=e1382] [cursor=pointer]:
                - img [ref=e1383]: expand_more
              - paragraph [ref=e1384]:
                - text: イタミアートがEC特化型のビジネスモデルで高い成長性を追求しているのに対し、ビーアンドピーは「営業拠点と工場が隣接した都心密着型」のモデルをとっている
                - superscript [ref=e1385]
                - text: 。大手クライアントの複雑な要望や、現場での施工までをカバーする「泥臭い一貫性」こそが同社の強みであり、これは安価なネット印刷では代替不可能な領域である
                - superscript [ref=e1386]
                - text: 。
                - button "詳細" [ref=e1389] [cursor=pointer]:
                  - img [ref=e1390]: expand_more
              - paragraph [ref=e1391]:
                - text: 海外に目を向ければ、サイン・ディスプレイ市場は米国のFASTSIGNSやSignaramaといったフランチャイズ形式の巨大企業が存在する。これらグローバルプレーヤーは、店舗オペレーションの標準化に強みを持つが、日本特有の「緻密な色再現」や「多種多様な什器との組み合わせ」といった高度な要求に対しては、同社の日本的なきめ細やかさが優位に働く
                - superscript [ref=e1392]
                - text: 。
                - button "詳細" [ref=e1395] [cursor=pointer]:
                  - img [ref=e1396]: expand_more
              - heading "参入障壁の正体" [level=3] [ref=e1397]
              - paragraph [ref=e1398]:
                - text: 同社の市場における優位性は、単なる「印刷機の保有」ではなく、以下の3要素の掛け合わせによる参入障壁によって守られている
                - superscript [ref=e1399]
                - text: 。
                - button "詳細" [ref=e1402] [cursor=pointer]:
                  - img [ref=e1403]: expand_more
              - list [ref=e1404]:
                - listitem [ref=e1405]:
                  - paragraph [ref=e1406]:
                    - generic [ref=e1407]: "資本集約性: 100台以上の最新プリンターを揃えるには数十億円規模の投資が必要であり、かつ技術革新のスピードが早いため、継続的な更新投資を伴う"
                    - superscript [ref=e1408]
                    - text: 。
                    - button "詳細" [ref=e1411] [cursor=pointer]:
                      - img [ref=e1412]: expand_more
                - listitem [ref=e1413]:
                  - paragraph [ref=e1414]:
                    - generic [ref=e1415]: "運用の卓越性: 24時間体制で稼働させるためのオペレーター確保と、深夜・早朝の入稿・発送に対応する物流・工程管理ノウハウは、一朝一夕には構築できない"
                    - superscript [ref=e1416]
                    - text: 。
                    - button "詳細" [ref=e1419] [cursor=pointer]:
                      - img [ref=e1420]: expand_more
                - listitem [ref=e1421]:
                  - paragraph [ref=e1422]:
                    - generic [ref=e1423]: "顧客接点の深さ: 取引継続率70%以上に示される通り、顧客のブランドカラーや販促スケジュールを熟知した営業担当者が「阿吽の呼吸」で対応しているため、スイッチングコストが極めて高い"
                    - superscript [ref=e1424]
                    - text: 。
                    - button "詳細" [ref=e1427] [cursor=pointer]:
                      - img [ref=e1428]: expand_more
              - heading "技術的優位性と知的財産" [level=2] [ref=e1429]
              - paragraph [ref=e1430]:
                - text: 同社は「技術のビーアンドピー」を自負しており、R&D投資の方向性も明確である
                - superscript [ref=e1431]
                - text: 。
                - button "詳細" [ref=e1434] [cursor=pointer]:
                  - img [ref=e1435]: expand_more
              - heading "保有技術と設備投資の方向性" [level=3] [ref=e1436]
              - paragraph [ref=e1437]:
                - text: 同社が保有する重要な技術的基盤は、以下の通りである
                - superscript [ref=e1438]
                - text: 。
                - button "詳細" [ref=e1441] [cursor=pointer]:
                  - img [ref=e1442]: expand_more
              - list [ref=e1443]:
                - listitem [ref=e1444]:
                  - paragraph [ref=e1445]:
                    - generic [ref=e1446]: "UVフラットベッドプリンター: 厚さ数センチまでの硬質素材（アクリル、金属、木材等）に直接印刷できる機器を複数台保有し、生産性を従来比3倍に向上させている"
                    - superscript [ref=e1447]
                    - text: 。
                    - button "詳細" [ref=e1450] [cursor=pointer]:
                      - img [ref=e1451]: expand_more
                - listitem [ref=e1452]:
                  - paragraph [ref=e1453]:
                    - generic [ref=e1454]: "DTF（Direct to Film）技術: フィルムに印刷した後に熱転写する技術で、アパレルや複雑な形状のグッズへの高品質プリントを可能にしている"
                    - superscript [ref=e1455]
                    - text: 。
                    - button "詳細" [ref=e1458] [cursor=pointer]:
                      - img [ref=e1459]: expand_more
                - listitem [ref=e1460]:
                  - paragraph [ref=e1461]:
                    - generic [ref=e1462]: "AR（拡張現実）オクルージョン: 2025年5月に発表された最新機能で、ARコンテンツが現実の遮蔽物の後ろに隠れる表現が可能となり、没入感を飛躍的に高めている"
                    - superscript [ref=e1463]
                    - text: 。
                    - button "詳細" [ref=e1466] [cursor=pointer]:
                      - img [ref=e1467]: expand_more
              - paragraph [ref=e1468]:
                - text: 自社IR資料によれば、R&Dの方向性は「環境対応」と「デジタル融合」の2軸に集約されている
                - superscript [ref=e1469]
                - text: 。環境面では、100%リサイクル可能な強化段ボール素材「リボード」の加工技術を高度化させ、脱プラスチックを目指す大手クライアントの什器需要に応えている
                - superscript [ref=e1470]
                - text: 。
                - button "詳細" [ref=e1473] [cursor=pointer]:
                  - img [ref=e1474]: expand_more
              - heading "客観的比較と第三者評価" [level=3] [ref=e1475]
              - paragraph [ref=e1476]:
                - text: ITmediaや日経ビジネス等のメディア分析記事に基づくと、同社の技術は「汎用設備の極限的な組み合わせ」と評価されている。特定の独占的特許に依存するのではなく、世界中から最新のハードウェアを調達し、それを自社独自のワークフローに組み込むことで、世界最高水準の「出力クオリティ」と「スピード」を両立させている点が、プロのデザイナーや広告代理店から高く評価されている
                - superscript [ref=e1477]
                - text: 。
                - button "詳細" [ref=e1480] [cursor=pointer]:
                  - img [ref=e1481]: expand_more
              - heading "規制環境・政策リスクおよびESG対応" [level=2] [ref=e1482]
              - paragraph [ref=e1483]: 同社の事業に関連する規制環境は、主に「景観法・屋外広告物法」と「環境規制」の2点に集約される。
              - heading "法規制と社会的要請" [level=3] [ref=e1484]
              - list [ref=e1485]:
                - listitem [ref=e1486]:
                  - paragraph [ref=e1487]:
                    - generic [ref=e1488]: "屋外広告物法: 看板の設置に関しては、各自治体が定める条例を遵守する必要がある"
                    - superscript [ref=e1489]
                    - text: 。同社は有資格者による施工体制を整えており、法令遵守（コンプライアンス）の徹底が、大手クライアントから選ばれる必須条件となっている
                    - superscript [ref=e1490]
                    - text: 。
                    - button "詳細" [ref=e1493] [cursor=pointer]:
                      - img [ref=e1494]: expand_more
                - listitem [ref=e1495]:
                  - paragraph [ref=e1496]:
                    - generic [ref=e1497]: "環境規制（PFAS等）: 世界的な化学物質規制の流れを受け、インクに含まれる成分や、廃棄される素材に対する視線が厳しくなっている。同社は、溶剤を使わないUVインクや、森林認証を受けた紙素材の利用を推進することで、規制変更リスクを先回りしてヘッジしている"
                    - superscript [ref=e1498]
                    - text: 。
                    - button "詳細" [ref=e1501] [cursor=pointer]:
                      - img [ref=e1502]: expand_more
              - heading "政策追い風の可能性" [level=3] [ref=e1503]
              - paragraph [ref=e1504]:
                - text: 政府が進める「観光立国」施策や「地方創生」に伴う都市開発プロジェクトは、同社にとって強力な追い風である
                - superscript [ref=e1505]
                - text: 。多言語対応のサイネージ設置や、地域ブランドをPRする大型イベントの開催は、同社のワンストップソリューションが最も得意とする領域である
                - superscript [ref=e1506]
                - text: 。また、「健康経営優良法人2026」の認定を取得するなど、ESG投資を重視する機関投資家からの視線も意識した経営が行われている
                - superscript [ref=e1507]
                - text: 。
                - button "詳細" [ref=e1510] [cursor=pointer]:
                  - img [ref=e1511]: expand_more
              - heading "海外展開と為替リスク" [level=2] [ref=e1512]
              - paragraph [ref=e1513]:
                - text: 現在、同社の直接的な売上は国内が大半を占めているが、技術と戦略の面ではグローバルな視点を持っている
                - superscript [ref=e1514]
                - text: 。
                - button "詳細" [ref=e1517] [cursor=pointer]:
                  - img [ref=e1518]: expand_more
              - list [ref=e1519]:
                - listitem [ref=e1520]:
                  - paragraph [ref=e1521]:
                    - generic [ref=e1522]: "提携戦略: シンガポールのZKDigimax社との業務提携は、その象徴である"
                    - superscript [ref=e1523]
                    - text: 。海外の先進的なAI・デジタル技術を取り込み、日本国内でサービス化する「インポーター型」の海外戦略をとっている
                    - superscript [ref=e1524]
                    - text: 。
                    - button "詳細" [ref=e1527] [cursor=pointer]:
                      - img [ref=e1528]: expand_more
                - listitem [ref=e1529]:
                  - paragraph [ref=e1530]:
                    - generic [ref=e1531]: "為替リスク: 主な原材料（海外製プリンター、特殊メディア、インク）は為替変動の影響を受けやすい"
                    - superscript [ref=e1532]
                    - text: 。円安局面では調達コストが上昇し、粗利率を圧迫する要因となる。2025年10月期の粗利率低下の一因にも、こうしたコスト増が含まれていると分析される
                    - superscript [ref=e1533]
                    - text: 。
                    - button "詳細" [ref=e1536] [cursor=pointer]:
                      - img [ref=e1537]: expand_more
              - heading "財務健全性と投資家向け指標" [level=2] [ref=e1538]
              - paragraph [ref=e1539]:
                - text: 同社の財務基盤は、上場企業の中でも極めて強固である
                - superscript [ref=e1540]
                - text: 。
                - button "詳細" [ref=e1543] [cursor=pointer]:
                  - img [ref=e1544]: expand_more
