            - generic [ref=e1020]:
              - heading "Sansan株式会社：名刺管理から「ビジネスインフラ」への昇華と持続的成長のメカニズム" [level=1] [ref=e1021]
              - heading "1. 事業セグメントの構造的分析と市場における立ち位置" [level=2] [ref=e1022]
              - paragraph [ref=e1023]:
                - text: Sansan株式会社（以下、同社）は、創業以来のコアコンピタンスである「名刺管理」を起点に、企業の営業活動およびバックオフィス業務をデジタル化する「ビジネスインフラ」の構築を推進している。現在の事業構造は、法人向けの営業DXサービスと請求書管理サービスを統合した「Sansan／Bill One事業」と、個人向け名刺アプリを軸とした「Eight事業」の2つの報告セグメントで構成されている
                - superscript [ref=e1024]
                - text: 。
                - button "詳細" [ref=e1027] [cursor=pointer]:
                  - img [ref=e1028]: expand_more
              - heading "セグメント別の事業概要とプロダクトの役割" [level=3] [ref=e1029]
              - paragraph [ref=e1030]:
                - text: 主力セグメントである「Sansan／Bill One事業」は、同社の売上高の9割以上を占める成長の源泉である。営業DXサービス「Sansan」は、名刺というアナログな接点情報をデジタル資産化し、組織全体の人脈を可視化・共有することで営業効率を最大化させる。従来の名刺管理ツールとしての枠組みを超え、現在は帝国データバンク等の企業データベースと連携した「ビジネスデータベース」へと進化しており、企業の営業戦略における「OS」のような役割を担っている
                - superscript [ref=e1031]
                - text: 。
                - button "詳細" [ref=e1034] [cursor=pointer]:
                  - img [ref=e1035]: expand_more
              - paragraph [ref=e1036]:
                - text: 一方、「Bill One」は2020年にローンチされたクラウド請求書受領サービスであり、あらゆる形式の請求書をオンラインで受領・一元管理することを可能にする。インボイス制度や電子帳簿保存法といった規制対応を追い風に、同社の第2の柱として爆発的な成長を遂げている。特に「Bill One」は、Sansanが長年培ってきた「高精度なデータ化技術」を請求書領域に応用したものであり、サービス開始から短期間で市場シェアNo.1を獲得するに至った
                - superscript [ref=e1037]
                - text: 。
                - button "詳細" [ref=e1040] [cursor=pointer]:
                  - img [ref=e1041]: expand_more
              - paragraph [ref=e1042]:
                - text: 「Eight事業」は、個人向け名刺アプリ「Eight」を基盤としている。当初はC2C（個人間）のネットワーク形成に主眼を置いていたが、近年は「Eight Career Design」を通じた採用支援サービスや、大規模ビジネスイベントの開催といったB2B領域へのシフトを強めている。このビジネスモデルの転換により、かつての「無料ユーザーを抱える赤字事業」から、高収益なB2Bサービスを内包する黒字化セグメントへと変貌を遂げた
                - superscript [ref=e1043]
                - text: 。
                - button "詳細" [ref=e1046] [cursor=pointer]:
                  - img [ref=e1047]: expand_more
