                  - button "Google スプレッドシートにエクスポート" [ref=e1095]:
                    - generic [ref=e1097]:
                      - img [ref=e1099]: drive_spreadsheet
                      - generic [ref=e1100]: Google スプレッドシートにエクスポート
                  - button "表をコピー" [ref=e1103] [cursor=pointer]:
                    - img [ref=e1104]: content_copy
              - paragraph [ref=e1107]:
                - text: ※注：利益構成比はセグメント利益（調整前）の合計に対する比率。調整後営業利益は売上拡大や売上総利益率の改善、販管費率の低下により大幅に増加している
                - superscript [ref=e1108]
                - text: 。
                - button "詳細" [ref=e1111] [cursor=pointer]:
                  - img [ref=e1112]: expand_more
              - heading "主要プロダクトの競争力評価と差別化要因" [level=3] [ref=e1113]
              - paragraph [ref=e1114]:
                - text: 同社のプロダクト群における最大の差別化要因は、99.9%という驚異的な「データ化精度」にある。これは、独自のAI・OCR技術と人力によるオペレーションを組み合わせたハイブリッドモデルによって実現されており、企業がビジネス上の意思決定を下すに足る「信頼できるデータベース」を構築している
                - superscript [ref=e1115]
                - text: 。
                - button "詳細" [ref=e1118] [cursor=pointer]:
                  - img [ref=e1119]: expand_more
              - list [ref=e1120]:
                - listitem [ref=e1121]:
                  - paragraph [ref=e1122]:
                    - generic [ref=e1123]: "Sansan（市場シェア 85.8%）: 法人向け名刺管理市場において圧倒的なデファクトスタンダードとなっており、13年連続でシェアNo.1を維持している"
                    - superscript [ref=e1124]
                    - text: 。解約率は0.4%台という極めて低い水準にあり、一度導入されると組織の「人脈資産」が蓄積されるため、他社ツールへの乗り換え障壁（スイッチングコスト）が非常に高い
                    - superscript [ref=e1125]
                    - text: 。
                    - button "詳細" [ref=e1128] [cursor=pointer]:
                      - img [ref=e1129]: expand_more
                - listitem [ref=e1130]:
                  - paragraph [ref=e1131]:
                    - generic [ref=e1132]: "Bill One（市場シェアNo.1）: 請求書の「形式を問わず」受領できるという汎用性と、Sansanの顧客基盤へのクロスセルが強力な武器となっている。単なる管理ツールにとどまらず、支払実行や経費精算へと機能を拡張し、企業の支出管理（Spend Management）プラットフォームへと進化している"
                    - superscript [ref=e1133]
                    - text: 。
                    - button "詳細" [ref=e1136] [cursor=pointer]:
                      - img [ref=e1137]: expand_more
                - listitem [ref=e1138]:
                  - paragraph [ref=e1139]:
                    - generic [ref=e1140]: "Eight（利用率No.1）: 約330万人のユーザー基盤を背景としたネットワーク効果が強みである。特にB2Bサービスである「Eight Career Design」は、名刺交換履歴という「信頼できる接点」に基づいたスカウトが可能であり、一般的な転職サイトとは異なる価値を提供している"
                    - superscript [ref=e1141]
                    - text: 。
                    - button "詳細" [ref=e1144] [cursor=pointer]:
                      - img [ref=e1145]: expand_more
              - heading "2. セグメント別成長ポテンシャルの定量的・定性的分析" [level=2] [ref=e1146]
              - paragraph [ref=e1147]:
                - text: 同社は、既存事業の安定的な成長と新規事業の急速な立ち上げを高いレベルで両立させている。連結売上高のCAGR（年平均成長率）として22%〜27%という目標を掲げており、これはSaaS企業の中でもトップクラスの水準である
                - superscript [ref=e1148]
                - text: 。
                - button "詳細" [ref=e1151] [cursor=pointer]:
                  - img [ref=e1152]: expand_more
              - heading "過去の成長トレンドとCAGRの推移" [level=3] [ref=e1153]
              - paragraph [ref=e1154]: 過去5年間の推移を見ると、Sansan事業は安定的に15%〜20%程度の成長を継続する一方、Bill One事業が前年比40%〜50%超という驚異的な伸びを示し、連結全体の成長を牽引している。
              - table [ref=e1156]:
                - rowgroup [ref=e1157]:
                  - row "サービス名 2026年5月期 見通し成長率 中長期的なCAGR目標 主要成長ドライバー" [ref=e1158]:
                    - cell "サービス名" [ref=e1159]
                    - cell "2026年5月期 見通し成長率" [ref=e1160]
                    - cell "中長期的なCAGR目標" [ref=e1161]
                    - cell "主要成長ドライバー" [ref=e1162]
                - rowgroup [ref=e1163]:
                  - row "Sansan 15% 〜 17% 15% 以上 営業人員の育成による契約件数増、ARPUの向上" [ref=e1164]:
                    - cell "Sansan" [ref=e1165]
                    - cell "15% 〜 17%" [ref=e1166]
                    - cell "15% 以上" [ref=e1167]
                    - cell "営業人員の育成による契約件数増、ARPUの向上" [ref=e1168]:
                      - paragraph [ref=e1169]:
                        - text: 営業人員の育成による契約件数増、ARPUの向上
                        - superscript [ref=e1170]
                  - row "Bill One 35% 〜 40% 30% 以上 インボイス制度対応、機能拡張によるクロスセル" [ref=e1171]:
                    - cell "Bill One" [ref=e1172]
                    - cell "35% 〜 40%" [ref=e1173]
                    - cell "30% 以上" [ref=e1174]
                    - cell "インボイス制度対応、機能拡張によるクロスセル" [ref=e1175]:
                      - paragraph [ref=e1176]:
                        - text: インボイス制度対応、機能拡張によるクロスセル
                        - superscript [ref=e1177]
                  - row "Eight 加速（70%目標有） 未公表 ビジネスイベントの大型化、採用支援の拡充" [ref=e1178]:
                    - cell "Eight" [ref=e1179]
                    - cell "加速（70%目標有）" [ref=e1180]
                    - cell "未公表" [ref=e1181]
                    - cell "ビジネスイベントの大型化、採用支援の拡充" [ref=e1182]:
                      - paragraph [ref=e1183]:
                        - text: ビジネスイベントの大型化、採用支援の拡充
                        - superscript [ref=e1184]
              - button "詳細" [ref=e1187] [cursor=pointer]:
                - img [ref=e1188]: expand_more
              - heading "今後の成長ドライバーとなるセグメント" [level=3] [ref=e1189]
              - paragraph [ref=e1190]:
                - text: 今後の最大の成長エンジンは「Bill One」である。請求書受領から始まったこのプロダクトは、現在「Bill One 経費精算」や「Bill One 請求書発行」など、隣接領域への拡張を加速させている。これにより、既存のBill One顧客からのアップセルが期待できるだけでなく、経理業務全般をカバーする「支出管理プラットフォーム」としての地位を確立することで、単価（ARPU）の大幅な上昇が見込まれる
                - superscript [ref=e1191]
                - text: 。
                - button "詳細" [ref=e1194] [cursor=pointer]:
                  - img [ref=e1195]: expand_more
              - paragraph [ref=e1196]:
                - text: また、Sansan事業においても、単なる名刺管理から「営業DX」へとコンセプトを転換し、大手企業（エンタープライズ）向けに数万人規模での導入を進めている。これにより、ストック売上高の基盤がより強固なものとなっている
                - superscript [ref=e1197]
                - text: 。
                - button "詳細" [ref=e1200] [cursor=pointer]:
                  - img [ref=e1201]: expand_more
              - heading "縮小・撤退リスクの検討" [level=3] [ref=e1202]
              - paragraph [ref=e1203]:
                - text: 現在、縮小・撤退のリスクが懸念されるセグメントは存在しない。かつて赤字が続いていた「Eight事業」についても、B2Bモデルへの転換と収益性重視の運営（調整後営業利益が前年比336.9%増）により、同社の利益創出に大きく貢献するセグメントへと脱皮した
                - superscript [ref=e1204]
                - text: 。リスクがあるとすれば、名刺そのものの交換頻度がデジタル化の進展により中長期的に減少する可能性だが、同社は「デジタル名刺」や「メール署名取り込み」などの機能を強化し、オフラインからオンラインへの接点情報の移行を先回りして押さえているため、この変化をむしろシェア拡大の機会としている
                - superscript [ref=e1205]
                - text: 。
                - button "詳細" [ref=e1208] [cursor=pointer]:
                  - img [ref=e1209]: expand_more
              - heading "3. 業界動向と競争環境のダイナミクス" [level=2] [ref=e1210]
              - paragraph [ref=e1211]: Sansanが属するSaaS市場は、日本のデジタル敗戦を挽回するための「DX投資」の最前線に位置している。
              - heading "市場規模の推移と成長の背景" [level=3] [ref=e1212]
              - paragraph [ref=e1213]:
                - text: 法人向け名刺管理サービスの市場規模は2024年に約291億円となり、2013年以降で約21倍に成長した
                - superscript [ref=e1214]
                - text: 。この急成長の背景には、従来は個人の引き出しに眠っていた名刺という「アナログな人脈」を、会社の資産として活用しようとする経営意識の変化がある。
                - button "詳細" [ref=e1217] [cursor=pointer]:
                  - img [ref=e1218]: expand_more
              - paragraph [ref=e1219]:
                - text: 一方、クラウド請求書管理市場は、法規制（インボイス制度、電帳法）への対応を主眼とした「Compliance-driven（規制主導型）」の成長を遂げている。この市場のTAM（獲得可能な最大市場規模）は名刺管理を遥かに凌駕しており、Sansanにとっての成長余地は依然として大きい
                - superscript [ref=e1220]
                - text: 。
                - button "詳細" [ref=e1223] [cursor=pointer]:
                  - img [ref=e1224]: expand_more
              - heading "参入障壁とその要因" [level=3] [ref=e1225]
              - paragraph [ref=e1226]: Sansanの参入障壁は、以下の3つの要素によって形成されている。
              - list [ref=e1227]:
                - listitem [ref=e1228]:
                  - paragraph [ref=e1229]:
                    - generic [ref=e1230]: "データ化オペレーションの規模経済: 99.9%の精度を実現するためには、AI技術だけでなく、膨大な数のオペレーターを統制するワークフローが必要である。後発企業が同等の精度とスピードを低コストで実現することは極めて困難である"
                    - superscript [ref=e1231]
                    - text: 。
                    - button "詳細" [ref=e1234] [cursor=pointer]:
                      - img [ref=e1235]: expand_more
                - listitem [ref=e1236]:
                  - paragraph [ref=e1237]:
                    - generic [ref=e1238]: "データ・グラビティ（データの重力）: 組織内に蓄積された過去10年以上の接点データや請求書データは、それ自体が強力なロックイン効果を生む。他社ツールへの移行は、単なる機能の代替ではなく、過去の資産の喪失を意味するため、解約率の低さにつながっている"
                    - superscript [ref=e1239]
                    - text: 。
                    - button "詳細" [ref=e1242] [cursor=pointer]:
                      - img [ref=e1243]: expand_more
                - listitem [ref=e1244]:
                  - paragraph [ref=e1245]:
                    - generic [ref=e1246]: "ネットワーク効果: 「Eight」の約330万人のユーザーや、「Bill One」を利用する数万社のサプライヤー（請求書発行側）との繋がりは、サービスを利用する企業が増えるほどその価値が高まるという、プラットフォーム特有の強みとなっている"
                    - superscript [ref=e1247]
                    - text: 。
                    - button "詳細" [ref=e1250] [cursor=pointer]:
                      - img [ref=e1251]: expand_more
              - heading "主要競合企業との比較" [level=3] [ref=e1252]
              - paragraph [ref=e1253]: 同社は名刺管理において独走状態にあるが、他の領域では強力なプレイヤーと競合している。
              - table [ref=e1255]:
                - rowgroup [ref=e1256]:
                  - row "領域 主要競合企業 Sansanの優位性 / 特徴" [ref=e1257]:
                    - cell "領域" [ref=e1258]
                    - cell "主要競合企業" [ref=e1259]
                    - cell "Sansanの優位性 / 特徴" [ref=e1260]
                - rowgroup [ref=e1261]:
                  - row "名刺管理 ウォンテッドリー, Salesforce 専業ならではのデータ化精度と日本的組織への適合" [ref=e1262]:
                    - cell "名刺管理" [ref=e1263]
                    - cell "ウォンテッドリー, Salesforce" [ref=e1264]
                    - cell "専業ならではのデータ化精度と日本的組織への適合" [ref=e1265]:
                      - paragraph [ref=e1266]:
                        - text: 専業ならではのデータ化精度と日本的組織への適合
                        - superscript [ref=e1267]
                  - row "請求書受領 インフォマート, マネーフォワード 請求書フォーマットを問わない柔軟性とUIの簡便さ" [ref=e1268]:
                    - cell "請求書受領" [ref=e1269]
                    - cell "インフォマート, マネーフォワード" [ref=e1270]
                    - cell "請求書フォーマットを問わない柔軟性とUIの簡便さ" [ref=e1271]:
                      - paragraph [ref=e1272]:
                        - text: 請求書フォーマットを問わない柔軟性とUIの簡便さ
                        - superscript [ref=e1273]
                  - row "営業DX ベルフェイス, 各種CRM/SFA 「接点データ」という独自の一次情報を起点とする点" [ref=e1274]:
                    - cell "営業DX" [ref=e1275]
                    - cell "ベルフェイス, 各種CRM/SFA" [ref=e1276]
                    - cell "「接点データ」という独自の一次情報を起点とする点" [ref=e1277]:
                      - paragraph [ref=e1278]:
                        - text: 「接点データ」という独自の一次情報を起点とする点
                        - superscript [ref=e1279]
              - button "詳細" [ref=e1282] [cursor=pointer]:
                - img [ref=e1283]: expand_more
              - paragraph [ref=e1284]:
                - text: 海外市場においては、LinkedIn（リンクトイン）などのSNSが名刺に近い役割を果たすが、日本では「名刺交換」という儀礼が根強く残っており、これがSansanにとっての参入障壁（国内保護壁）として機能している。海外展開においては、この文化的な差を「接点のインテリジェンス」としてどう翻訳するかが鍵となる
                - superscript [ref=e1285]
                - text: 。
                - button "詳細" [ref=e1288] [cursor=pointer]:
                  - img [ref=e1289]: expand_more
              - heading "4. 技術的優位性と知的財産戦略の詳細" [level=2] [ref=e1290]
              - paragraph [ref=e1291]: Sansanの技術戦略は、単に最先端の技術を追うのではなく、ビジネス現場の「アナログな摩擦」をいかにテクノロジーで解消するかに集中している。
              - heading "重要技術とR&D投資の方向性" [level=3] [ref=e1292]
              - paragraph [ref=e1293]: 同社の研究開発の司令塔は「DSOC（Data Strategy & Operation Center）」である。ここでは、画像解析、自然言語処理、社会科学の知見を融合させた研究が行われている。
              - list [ref=e1294]:
                - listitem [ref=e1295]:
                  - paragraph [ref=e1296]:
                    - generic [ref=e1297]: "独自のOCR技術「DSOC OCR」: 名刺上の情報を99.9%の精度で認識するために、文字認識だけでなく、名刺のレイアウト解析や、社名・住所の正規化アルゴリズムを自社開発している。これにより、二次納品（オペレーター校正後）までの時間を大幅に短縮している"
                    - superscript [ref=e1298]
                    - text: 。
                    - button "詳細" [ref=e1301] [cursor=pointer]:
                      - img [ref=e1302]: expand_more
                - listitem [ref=e1303]:
                  - paragraph [ref=e1304]:
                    - generic [ref=e1305]: "生成AI（LLM）の統合: 2025年を「AI元年」と位置づけ、生成AIをプロダクトに組み込む「AIファースト」戦略を推進している。蓄積された接点データをAIが解析し、「どのタイミングで誰にどのようなメールを送るべきか」といった具体的なアクションを提案する機能の開発に注力している"
                    - superscript [ref=e1306]
                    - text: 。
                    - button "詳細" [ref=e1309] [cursor=pointer]:
                      - img [ref=e1310]: expand_more
                - listitem [ref=e1311]:
                  - paragraph [ref=e1312]:
                    - generic [ref=e1313]: "非定型ドキュメントの構造化: 請求書や契約書などの非定型なPDFから、必要な情報を自動抽出する技術を磨いている。これは「Bill One」の利益率向上に直結しており、データ化オペレーションの効率化により売上総利益率は前年同期比で2.0ポイント以上改善している"
                    - superscript [ref=e1314]
                    - text: 。
                    - button "詳細" [ref=e1317] [cursor=pointer]:
                      - img [ref=e1318]: expand_more
              - heading "知的財産（IP）の保護体制" [level=3] [ref=e1319]
              - paragraph [ref=e1320]:
                - text: 同社は、独自のデータ化ワークフローやユーザーインターフェースについて積極的に特許を取得している。特に「名刺を撮影して組織図を自動生成する」などのビジネスモデル特許は、競合他社に対する強力な抑止力となっている。また、SansanやBill Oneといったブランド名も重要な知的財産として位置づけ、広告宣伝投資を通じてそのブランド価値（信頼性）を高める戦略をとっている
                - superscript [ref=e1321]
                - text: 。
                - button "詳細" [ref=e1324] [cursor=pointer]:
                  - img [ref=e1325]: expand_more
              - heading "5. 規制環境の変化と政策的追い風" [level=2] [ref=e1326]
              - paragraph [ref=e1327]: Sansanにとって、日本のDX推進に関連する法改正は、強力な外部の成長エンジンとなっている。
              - heading "インボイス制度と電子帳簿保存法" [level=3] [ref=e1328]
              - list [ref=e1329]:
                - listitem [ref=e1330]:
                  - paragraph [ref=e1331]:
                    - generic [ref=e1332]: "インボイス制度（2023年10月〜）: 適格請求書の保存が仕入税額控除の条件となったことで、企業は請求書が「適格」であるかを厳密にチェックする必要が生じた。Bill Oneは、この判定を自動化する機能を提供することで、経理部門の負担を劇的に軽減した"
                    - superscript [ref=e1333]
                    - text: 。
                    - button "詳細" [ref=e1336] [cursor=pointer]:
                      - img [ref=e1337]: expand_more
                - listitem [ref=e1338]:
                  - paragraph [ref=e1339]:
                    - generic [ref=e1340]: "電子帳簿保存法: 電子取引データの書面保存が原則廃止され、電子保存が義務化された。これにより、紙で届く請求書もスキャンしてデジタル保存するニーズが爆発し、Bill Oneの導入を決定づける強力な「言い訳（予算獲得の根拠）」を顧客に提供した"
                    - superscript [ref=e1341]
                    - text: 。
                    - button "詳細" [ref=e1344] [cursor=pointer]:
                      - img [ref=e1345]: expand_more
              - heading "今後の規制変更リスクと政策" [level=3] [ref=e1346]
              - paragraph [ref=e1347]:
                - text: 現在のデジタル化推進政策は同社にとって追い風だが、将来的なリスクとしては「個人情報保護法」の更なる厳格化が挙げられる。同社は全社員に個人情報保護士の資格取得を義務付けるなど、コンプライアンス体制を極めて高く設定しており、規制を「壁」ではなく「信頼の証」へと変換する戦略をとっている
                - superscript [ref=e1348]
                - text: 。また、政府が進める「デジタル庁」主導の標準化の動きも、アナログ情報のデジタル化を本業とする同社にとっては、データ連携の機会を広げるポジティブな要因と捉えられる。
                - button "詳細" [ref=e1351] [cursor=pointer]:
                  - img [ref=e1352]: expand_more
              - heading "6. 海外展開の現状とグローバル・インフラへの道筋" [level=2] [ref=e1353]
              - paragraph [ref=e1354]: Sansanは、日本国内での成功を足がかりに、「Sansan Global」として東南アジアを中心に拠点を広げている。
              - heading "地域別戦略と進出状況" [level=3] [ref=e1355]
              - list [ref=e1356]:
                - listitem [ref=e1357]:
                  - paragraph [ref=e1358]:
                    - generic [ref=e1359]: "シンガポール・タイ: 東南アジアのビジネスハブであるシンガポールを拠点に、現地企業および日系企業への導入を進めている。欧米系のCRM（Salesforce等）と連携し、CRMへのデータ入力負荷をゼロにする「Data Entry Solution」として訴求している"
                    - superscript [ref=e1360]
                    - text: 。
                    - button "詳細" [ref=e1363] [cursor=pointer]:
                      - img [ref=e1364]: expand_more
                - listitem [ref=e1365]:
                  - paragraph [ref=e1366]:
                    - generic [ref=e1367]: "開発拠点のグローバル化: ベトナム（ホーチミン、ダナン）やフィリピン（セブ）に開発拠点を設置している。これにより、世界中の優秀なエンジニアを獲得できる体制を整えるとともに、多言語・多通貨対応のスピードを上げている"
                    - superscript [ref=e1368]
                    - text: 。
                    - button "詳細" [ref=e1371] [cursor=pointer]:
                      - img [ref=e1372]: expand_more
              - heading "為替リスクと収益への影響" [level=3] [ref=e1373]
              - paragraph [ref=e1374]:
                - text: 現在の海外売上比率は数%程度と推測されるため、為替変動が売上高に与える直接的なインパクトは限定的である
                - superscript [ref=e1375]
                - text: 。しかし、中長期的には海外ARRの比率を高めることを目標としており、その過程でドル建てのサーバー費用や海外人件費の変動リスクを管理する必要がある。現状では、円安は海外拠点のコスト上昇要因となるが、グローバルでの競争力を高める投資期間と位置づけている
                - superscript [ref=e1376]
                - text: 。
                - button "詳細" [ref=e1379] [cursor=pointer]:
                  - img [ref=e1380]: expand_more
              - heading "7. 投資判断のための総合的財務分析と結論" [level=2] [ref=e1381]
              - paragraph [ref=e1382]: Sansanは、これまでの「赤字覚悟のシェア拡大」フェーズから、明確に「高い成長と利益創出の両立」フェーズへと移行している。
              - heading "収益性向上のメカニズム" [level=3] [ref=e1383]
              - paragraph [ref=e1384]:
                - text: 最新の四半期決算において、調整後営業利益率は18.7%に達した。この利益率向上の背景には、以下の「収益レバレッジ」が効き始めたことがある
                - superscript [ref=e1385]
                - text: 。
                - button "詳細" [ref=e1388] [cursor=pointer]:
                  - img [ref=e1389]: expand_more
              - list [ref=e1390]:
                - listitem [ref=e1391]:
                  - paragraph [ref=e1392]:
                    - generic [ref=e1393]: "販管費率の低下: 本社移転に関連する一時的な費用（二重家賃等）がなくなり、売上拡大に対して固定費の伸びが抑制されている"
                    - superscript [ref=e1394]
                    - text: 。
                    - button "詳細" [ref=e1397] [cursor=pointer]:
                      - img [ref=e1398]: expand_more
                - listitem [ref=e1399]:
                  - paragraph [ref=e1400]:
                    - generic [ref=e1401]: "Bill Oneのユニット・エコノミクス改善: 導入社数の増加に伴い、データ化オペレーションの自動化比率が上昇し、限界利益率が向上している。Bill Oneは既にセグメント黒字化を達成し、連結の利益押し上げ要因となっている"
                    - superscript [ref=e1402]
                    - text: 。
                    - button "詳細" [ref=e1405] [cursor=pointer]:
                      - img [ref=e1406]: expand_more
              - heading "中期財務目標と達成の確度" [level=3] [ref=e1407]
              - paragraph [ref=e1408]:
                - text: 同社は2027年5月期に「調整後営業利益率18%〜23%」という目標を掲げているが、2026年第2四半期時点で既にこのレンジに到達しており、目標の達成は極めて現実的である
                - superscript [ref=e1409]
                - text: 。
