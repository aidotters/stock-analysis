                    - cell "ナレッジ (Knowledge)" [ref=e1101]
                    - cell "業務改善支援ツール、DX推進、データ利活用、教育研修" [ref=e1102]
                    - cell "約20% - 25%" [ref=e1103]
                    - cell "拡大基調" [ref=e1104]
                    - cell "現場の暗黙知を形式知化するコンサルティング能力" [ref=e1105]:
                      - paragraph [ref=e1106]:
                        - text: 現場の暗黙知を形式知化するコンサルティング能力
                        - superscript [ref=e1107]
                  - row "その他 SaaS商材ライセンス（BOXIL等）、府中自動車の連結寄与 約5% - 10% ライセンス収入増 ストック型収益の構築、専門子会社による相乗効果" [ref=e1108]:
                    - cell "その他" [ref=e1109]
                    - cell "SaaS商材ライセンス（BOXIL等）、府中自動車の連結寄与" [ref=e1110]
                    - cell "約5% - 10%" [ref=e1111]
                    - cell "ライセンス収入増" [ref=e1112]
                    - cell "ストック型収益の構築、専門子会社による相乗効果" [ref=e1113]:
                      - paragraph [ref=e1114]:
                        - text: ストック型収益の構築、専門子会社による相乗効果
                        - superscript [ref=e1115]
              - button "詳細" [ref=e1118] [cursor=pointer]:
                - img [ref=e1119]: expand_more
              - heading "マーケティングセグメント：テクニカルイラストレーションの深化" [level=3] [ref=e1120]
              - paragraph [ref=e1121]:
                - text: マーケティングセグメントの核となるのは、テクニカルイラストレーションおよびマニュアル制作である。世界市場において、テクニカルイラストレーションソフトウェアの市場規模は2025年に49.8億ドルに達し、CAGR 3.8％で成長すると予測されている
                - superscript [ref=e1122]
                - text: 。CMCはこの領域において、単なる静止画の図解ではなく、3D技術やアニメーション、VR/ARを活用した次世代型のテクニカルコミュニケーションへと舵を切っている。
                - button "詳細" [ref=e1125] [cursor=pointer]:
                  - img [ref=e1126]: expand_more
              - paragraph [ref=e1127]:
                - text: このセグメントの強みは、設計段階のCADデータを直接活用し、製造・販売・修理の各工程で必要な情報をシームレスに生成できる点にある
                - superscript [ref=e1128]
                - text: 。特に、主要販売先であるトヨタ自動車向けの国内売上が前期比10％超の増加を示したことは、新型車開発や複雑化する車両システム（EV、ADAS等）に伴うドキュメント需要の底堅さを証明している
                - superscript [ref=e1129]
                - text: 。
                - button "詳細" [ref=e1132] [cursor=pointer]:
                  - img [ref=e1133]: expand_more
              - heading "ナレッジ（Knowledge）セグメント：DX支援への昇華" [level=3] [ref=e1134]
              - paragraph [ref=e1135]:
                - text: ナレッジセグメントは、CMCの将来を担う成長エンジンである。製造業における「2025年の崖」や人手不足を背景に、業務プロセスの抜本的な見直しが求められている中、同社はマニュアル制作で培った「情報の整理・構造化」のノウハウを武器に、企業のDX推進を支援している
                - superscript [ref=e1136]
                - text: 。
                - button "詳細" [ref=e1139] [cursor=pointer]:
                  - img [ref=e1140]: expand_more
              - paragraph [ref=e1141]:
                - text: 富士キメラ総研の調査によれば、国内のDX市場は2030年度に9.2兆円規模に成長するとされており、CMCが提供するデータ利活用商材や業務改善支援ツールは、この巨大な市場トレンドに合致している
                - superscript [ref=e1142]
                - text: 。同セグメントでは、販売支援施策の拡大が成長を牽引しており、顧客企業の売上向上に直結するソリューションを提供できている点が、単なる「コスト削減型」のDXベンダーとの違いである
                - superscript [ref=e1143]
                - text: 。
                - button "詳細" [ref=e1146] [cursor=pointer]:
                  - img [ref=e1147]: expand_more
              - heading "その他セグメント：SaaSと垂直統合の進展" [level=3] [ref=e1148]
              - paragraph [ref=e1149]:
                - text: 「その他」セグメントでは、SaaS商材のライセンス収入が拡大しており、フロー型からストック型への収益構造の転換が試みられている
                - superscript [ref=e1150]
                - text: 。特に、比較サイト「BOXIL」や「ITreview」に関連するユーザー評価は、同社のデジタルプラットフォーム運営における課題と可能性の両面を浮き彫りにしている。
                - button "詳細" [ref=e1153] [cursor=pointer]:
                  - img [ref=e1154]: expand_more
              - paragraph [ref=e1155]:
                - text: ITreviewなどのユーザーレビュー（第三者ソース）によると、同社が関与する情報プラットフォームは「UIの見やすさ」「情報のコンパクトな整理」が高く評価されている一方で、リード（見込み客）の質や、モバイル環境での操作性において改善の余地があるとの指摘も見られる
                - superscript [ref=e1156]
                - text: 。また、府中自動車の連結子会社化は、実機を用いたマニュアルの検証や、整備現場のリアリティを事業にフィードバックさせる「垂直統合」の動きとして注目される
                - superscript [ref=e1157]
                - text: 。
                - button "詳細" [ref=e1160] [cursor=pointer]:
                  - img [ref=e1161]: expand_more
              - heading "セグメント別成長性と持続可能性の検証" [level=2] [ref=e1162]
              - paragraph [ref=e1163]: CMCの成長を語る上で欠かせないのが、過去3〜5年のトレンドから読み解く持続可能性である。
              - heading "成長トレンドと今後のドライバー" [level=3] [ref=e1164]
              - paragraph [ref=e1165]:
                - text: 過去数年、CMCは着実な成長を遂げてきたが、その背景には「デジタル変革推進活動」の深化がある
                - superscript [ref=e1166]
                - text: 。今後の成長を牽引する要素として、以下の3点が特定される。
                - button "詳細" [ref=e1169] [cursor=pointer]:
                  - img [ref=e1170]: expand_more
              - list [ref=e1171]:
                - listitem [ref=e1172]:
                  - paragraph [ref=e1173]: "製造業のサービタイゼーション（サービス化）: 自動車が「売って終わり」の製品から、常にソフトウェアが更新される「サービス」へと変化する中、マニュアルや技術情報もリアルタイムでの更新とパーソナライズが求められる。これはCMCの得意とする動的なコンテンツ管理能力が最大限に発揮される領域である。"
                - listitem [ref=e1174]:
                  - paragraph [ref=e1175]:
                    - generic [ref=e1176]: "SaaS・ライセンス事業のストック化: 自社開発の業務改善ツールやプラットフォームの普及により、制作受託の「労働集約型」モデルから、ライセンス収入による「知識集約型」モデルへのシフトが進んでいる"
                    - superscript [ref=e1177]
                    - text: 。
                    - button "詳細" [ref=e1180] [cursor=pointer]:
                      - img [ref=e1181]: expand_more
                - listitem [ref=e1182]:
                  - paragraph [ref=e1183]:
                    - generic [ref=e1184]: "グローバル・テクニカルコミュニケーション需要: 2029年に向けて、世界のテクニカルイラストレーション市場はCAGR 9.2％と成長が加速する予測があり、14の海外拠点を持つCMCはこのグローバルな追い風を享受できる立場にある"
                    - superscript [ref=e1185]
                    - text: 。
                    - button "詳細" [ref=e1188] [cursor=pointer]:
                      - img [ref=e1189]: expand_more
              - heading "成長に対する懐疑的な見方とリスク" [level=3] [ref=e1190]
              - paragraph [ref=e1191]:
                - text: 一方で、成長の持続性に対しては慎重な議論も存在する。最大の懸念は、生成AIの普及による「情報の自動生成」が、同社の制作代行業務をリプレイスする可能性である。しかし、第三者視点の分析によれば、テクニカルイラストレーションには複雑な3Dデータの理解や法規制への準拠が必要であり、全自動化には依然として高いハードルが存在する
                - superscript [ref=e1192]
                - text: 。CMC自身もAIを「敵」ではなく「ツール」として活用し、人間はより高度な「情報の設計・コンサルティング」に特化する方針を採っている。
                - button "詳細" [ref=e1195] [cursor=pointer]:
                  - img [ref=e1196]: expand_more
              - paragraph [ref=e1197]:
                - text: また、国内のDX投資は2027年頃まで試行錯誤が続くと予測されており、有効な利用方法が確立されるまでは、顧客企業の投資意欲にムラが生じるリスクも否定できない
                - superscript [ref=e1198]
                - text: 。
                - button "詳細" [ref=e1201] [cursor=pointer]:
                  - img [ref=e1202]: expand_more
              - heading "業界動向と競争環境：DXという広大な戦場" [level=2] [ref=e1203]
              - paragraph [ref=e1204]: CMCが活動するフィールドは、従来の「マニュアル制作業界」から、より広範な「DXソリューション業界」へと拡大している。この領域における市場規模と競争環境の分析は、同社の将来価値を測る上で極めて重要である。
              - heading "市場規模の推移と見通し" [level=3] [ref=e1205]
              - paragraph [ref=e1206]: 各調査機関のデータに基づき、関連市場の規模を整理すると以下の通りとなる。
              - table [ref=e1208]:
                - rowgroup [ref=e1209]:
                  - row "市場カテゴリー 調査元 2025年度予測 特記事項" [ref=e1210]:
