                      - paragraph [ref=e1431]:
                        - text: 資金効率化が寄与
                        - superscript [ref=e1432]
                  - row "当期純利益 20億78百万円 +18.0% 親会社帰属分" [ref=e1433]:
                    - cell "当期純利益" [ref=e1434]
                    - cell "20億78百万円" [ref=e1435]
                    - cell "+18.0%" [ref=e1436]
