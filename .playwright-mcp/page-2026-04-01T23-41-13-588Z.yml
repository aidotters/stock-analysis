              - heading "シイエム・シイ（2185）における事業構造の転換と製造業DX市場における競争優位性の包括的分析" [level=1] [ref=e1058]
              - heading "序論：テクニカルコミュニケーションの再定義と投資価値の源泉" [level=2] [ref=e1059]
              - paragraph [ref=e1060]:
                - text: シイエム・シイ（以下、CMC）は、日本の製造業、とりわけ世界をリードするモビリティ産業の知識基盤を支えてきたテクニカルコミュニケーションの専門集団である。同社の本質的な価値は、単なる「マニュアル制作」という既存の枠組みを超え、複雑な技術情報を構造化し、それを企業の競争力へと変換する「ナレッジマネジメント」の領域に移行しつつある。2024年9月期の決算において、売上高195億23百万円（前期比5.8％増）、営業利益29億75百万円（前期比13.7％増）と、過去最高を更新した事実は、同社が推進する事業構造の転換が着実に実を結んでいることを示唆している
                - superscript [ref=e1061]
                - text: 。
                - button "詳細" [ref=e1064] [cursor=pointer]:
                  - img [ref=e1065]: expand_more
              - paragraph [ref=e1066]:
                - text: 主要顧客であるトヨタ自動車との長年にわたる取引を通じて培われた、極めて高い品質基準と情報管理能力は、同社の参入障壁を強固なものとしている。しかし、現在のCMCを評価する上で最も重要な視点は、トヨタ自動車への依存度が「健全な形」で低下している点にある。2023年9月期の35.6％から2024年9月期の34.0％、さらに2025年9月期の予測値である26.7％という推移は、トヨタ向けの絶対額が減少しているのではなく、それ以外のDX支援（ナレッジ）領域やSaaS商材がそれを上回る速度で成長し、顧客ポートフォリオが多角化していることを物語っている
                - superscript [ref=e1067]
                - text: 。
                - button "詳細" [ref=e1070] [cursor=pointer]:
                  - img [ref=e1071]: expand_more
              - paragraph [ref=e1072]: 本レポートでは、CMCの各事業セグメントの現状と成長性、それを取り巻く市場環境の動向、技術的優位性、そして直面するリスクについて、第三者機関の調査レポートやメディアの分析を交えながら、投資判断に資する深掘り調査を実施した。
              - heading "セグメント別事業分析：既存事業の安定と新領域の加速" [level=2] [ref=e1073]
              - paragraph [ref=e1074]:
                - text: CMCの事業構造は、「マーケティング」「ナレッジ（Knowledge）」「その他」の3つのセグメントで構成されている。それぞれのセグメントは、相互に補完し合う関係にあり、マニュアル制作で得た知見をDX支援に活かし、DX支援で培ったデジタル技術をマニュアル制作に還元するという循環構造を形成している
                - superscript [ref=e1075]
                - text: 。
                - button "詳細" [ref=e1078] [cursor=pointer]:
