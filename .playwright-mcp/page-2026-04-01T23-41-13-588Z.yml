                  - row "世界テクニカルイラスト Global Info 49.8億ドル 今後CAGR 9.2%へ加速" [ref=e1246]:
                    - cell "世界テクニカルイラスト" [ref=e1247]
                    - cell "Global Info" [ref=e1248]
